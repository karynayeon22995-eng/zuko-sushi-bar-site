<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gallery — Zuko Sushi Bar | San Jose, CA</title>
  <meta name="description" content="A look at the fresh sushi, sashimi, signature rolls and Japanese dishes at Zuko Sushi Bar in San Jose, CA.">
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Open+Sans:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header class="header">
    <div class="header__inner">
      <a href="index.html" class="header__logo" aria-label="Zuko Sushi Bar — home">
        <img src="assets/logo.png" alt="Zuko Sushi Bar">
      </a>
      <button class="nav-toggle" type="button" aria-label="Toggle menu" aria-controls="nav" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <nav class="nav" id="nav">
        <a href="index.html">HOME</a>
        <a href="gallery.html" aria-current="page">GALLERY</a>
        <a href="menu.html">MENU</a>
        <a href="contact.html">CONTACT US</a>
      </nav>
    </div>
  </header>

  <section class="page-hero">
    <p class="eyebrow">FRESH &amp; DELICIOUS</p>
    <h1 class="h-section h-section--light">Our Gallery</h1>
    <div class="divider divider--center" style="margin-top:20px"></div>
  </section>

  <section class="section gallery">
    <div class="wrap--wide">
      <div class="gallery__grid">
        <figure class="gallery__item"><img src="assets/sashimi-platter.png" alt="Sashimi Platter" loading="lazy" decoding="async"></figure>
        <figure class="gallery__item"><img src="assets/sushi-platter.png" alt="Sushi Platter" loading="lazy" decoding="async"></figure>
        <figure class="gallery__item"><img src="assets/rolls-closeup.png" alt="Specialty Rolls" loading="lazy" decoding="async"></figure>
        <figure class="gallery__item"><img src="assets/chopstick-roll.png" alt="Sushi Roll with Chopsticks" loading="lazy" decoding="async"></figure>
        <figure class="gallery__item"><img src="assets/teriyaki-bowl.png" alt="Teriyaki Bowl" loading="lazy" decoding="async"></figure>
        <figure class="gallery__item"><img src="assets/tempura-udon.png" alt="Tempura Udon" loading="lazy" decoding="async"></figure>
        <figure class="gallery__item"><img src="assets/salmon-board.png" alt="Salmon Sushi Board" loading="lazy" decoding="async"></figure>
        <figure class="gallery__item"><img src="assets/kani-sushi.png" alt="Kani Sushi" loading="lazy" decoding="async"></figure>
        <figure class="gallery__item"><img src="assets/nigiri-closeup.png" alt="Nigiri Close Up" loading="lazy" decoding="async"></figure>
        <figure class="gallery__item"><img src="assets/sake-pour.png" alt="Sake Service" loading="lazy" decoding="async"></figure>
        <figure class="gallery__item"><img src="assets/teriyaki-bowl.png" alt="Chef's Special" loading="lazy" decoding="async" style="filter:saturate(1.1)"></figure>
        <figure class="gallery__item"><img src="assets/sushi-platter.png" alt="Party Platter" loading="lazy" decoding="async" style="filter:brightness(1.05)"></figure>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="wrap">
      <img class="footer__logo" src="assets/logo.png" alt="Zuko Sushi Bar">
      <p class="footer__copy">© 2026 Zuko Sushi Bar. All rights reserved.</p>
    </div>
  </footer>

  <div class="mobile-order"><a href="order.html" data-order="sticky">ORDER ONLINE</a></div>
  <script src="js/main.js" defer></script>
</body>
</html>
